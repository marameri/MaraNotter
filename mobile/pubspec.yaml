name: maranotter
description: AI-powered audio recording and note-taking app
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  get: ^4.6.5
  
  # Audio
  record: ^4.4.4
  just_audio: ^0.9.31
  audio_waveforms: ^1.0.4
  
  # API & HTTP
  dio: ^5.3.1
  http: ^1.1.0
  
  # Storage
  get_storage: ^2.1.1
  shared_preferences: ^2.2.1
  
  # UI
  flutter_svg: ^2.0.7
  intl: ^0.19.0
  
  # Calendar
  table_calendar: ^3.0.9
  
  # File handling
  file_picker: ^6.0.0
  path_provider: ^2.1.1
  
  # Networking
  socket_io_client: ^2.0.1
  
  # Utils
  uuid: ^4.0.0
  crypto: ^3.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
  
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
